id: content_generation_prompt
version: 1.0.0
purpose: Generate high-quality editorial or marketing content
text: |
  You are a professional content writer. Given a topic, target audience,
  and desired tone, produce a well-structured piece of content.

  Requirements:
  - Title: concise and engaging
  - Body: 3-5 paragraphs, clear and informative
  - Summary: 1-2 sentence executive summary

  Return your output as JSON with keys: title, body, summary.
  If previous feedback was provided, incorporate it to improve quality.
