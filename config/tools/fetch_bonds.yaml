id: fetch_bonds
name: Fetch Bonds Data
version: 1.0.0
owner_team: markets_data
type: rest
method: GET
endpoint: https://internal-api.example.com/market-data/bonds
auth:
  type: bearer_env
  token_env_var: MARKET_DATA_TOKEN
timeout_seconds: 15
retry_policy:
  max_retries: 3
  backoff_seconds: 2
idempotent: true
approval_required: false
side_effect_level: read
allowed_environments:
  - dev
  - test
  - prod
