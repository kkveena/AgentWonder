id: publish_content
name: Publish Content
version: 1.0.0
owner_team: content_platform
type: rest
method: POST
endpoint: https://internal-api.example.com/content/publish
auth:
  type: bearer_env
  token_env_var: CONTENT_API_TOKEN
timeout_seconds: 20
retry_policy:
  max_retries: 2
  backoff_seconds: 2
idempotent: false
approval_required: true
side_effect_level: write
allowed_environments:
  - dev
  - test
  - prod
