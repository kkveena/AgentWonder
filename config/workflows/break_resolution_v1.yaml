id: break_resolution_v1
name: Break Resolution Workflow
version: 1.0.0
owner_team: markets_ops_ai
template: sequential_with_approval
description: >
  Resolves an operations break by gathering context, proposing action,
  pausing for checker approval, and then posting the final update.
models:
  default: gemini-2.5-flash
  evaluator: gemini-2.5-pro
tool_refs:
  - fetch_break_details
  - fetch_trade_context
  - suggest_resolution
  - post_resolution_update
inputs:
  required:
    - break_id
    - source_system
steps:
  - id: enrich_break
    type: tool_call
    tool: fetch_break_details
  - id: enrich_trade_context
    type: tool_call
    tool: fetch_trade_context
    depends_on:
      - enrich_break
  - id: propose_resolution
    type: llm_agent
    prompt_ref: propose_resolution_prompt
    tools:
      - suggest_resolution
    depends_on:
      - enrich_trade_context
  - id: checker_approval
    type: approval
    approval_ref: checker_signoff
    depends_on:
      - propose_resolution
  - id: update_downstream
    type: tool_call
    tool: post_resolution_update
    depends_on:
      - checker_approval
output:
  format: json
  schema_ref: break_resolution_output
evals:
  suite: break_resolution_smoke
